services:
  logger.channel.ai_content_strategy:
    parent: logger.channel_base
    arguments: ['ai_content_strategy']

  ai_content_strategy.recommendation_storage:
    class: Drupal\ai_content_strategy\Service\RecommendationStorageService
    arguments: ['@keyvalue', '@datetime.time']

  ai_content_strategy.idea_row_builder:
    class: Drupal\ai_content_strategy\Service\IdeaRowBuilder
    arguments: ['@renderer']

  ai_content_strategy.ajax_response_builder:
    class: Drupal\ai_content_strategy\Service\AjaxResponseBuilder
    arguments: ['@date.formatter']

  ai_content_strategy.category_schema_builder:
    class: Drupal\ai_content_strategy\Service\CategorySchemaBuilder
    arguments: ['@entity_type.manager', '@cache.default']

  ai_content_strategy.category_prompt_builder:
    class: Drupal\ai_content_strategy\Service\CategoryPromptBuilder
    arguments: ['@logger.factory']

  ai_content_strategy.strategy_generator:
    class: Drupal\ai_content_strategy\Service\StrategyGenerator
    arguments:
      - '@ai.provider'
      - '@ai_content_strategy.content_analyzer'
      - '@ai.prompt_json_decode'
      - '@messenger'
      - '@config.factory'
      - '@ai_content_strategy.category_schema_builder'
      - '@ai_content_strategy.category_prompt_builder'

  ai_content_strategy.content_analyzer:
    class: Drupal\ai_content_strategy\Service\ContentAnalyzer
    arguments: ['@entity_type.manager', '@menu.active_trail', '@http_client', '@config.factory', '@renderer', '@module_handler', '@logger.channel.ai_content_strategy']
