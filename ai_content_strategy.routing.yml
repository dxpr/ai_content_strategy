ai_content_strategy.recommendations:
  path: '/admin/reports/ai/content-strategy'
  defaults:
    _controller: '\Drupal\ai_content_strategy\Controller\ContentStrategyController::recommendations'
    _title: 'AI Content Strategy'
  requirements:
    _permission: 'access ai content strategy'

ai_content_strategy.recommendations.generate:
  path: '/admin/reports/ai/content-strategy/generate'
  defaults:
    _controller: '\Drupal\ai_content_strategy\Controller\ContentStrategyController::generateRecommendationsAjax'
    _title: 'Generate Recommendations'
  requirements:
    _permission: 'access ai content strategy'
  options:
    _admin_route: TRUE

ai_content_strategy.generate_more:
  path: '/admin/reports/ai/content-strategy/generate-more/{section}/{title}'
  defaults:
    _controller: '\Drupal\ai_content_strategy\Controller\ContentStrategyController::generateMore'
    _title: 'Generate More Ideas'
  requirements:
    _permission: 'access ai content strategy'
  options:
    parameters:
      section:
        type: string
      title:
        type: string

ai_content_strategy.add_more_recommendations:
  path: '/admin/reports/ai/content-strategy/add-more/{section}'
  defaults:
    _controller: '\Drupal\ai_content_strategy\Controller\ContentStrategyController::addMoreRecommendations'
    _title: 'Add More Recommendations'
  requirements:
    _permission: 'access ai content strategy'
  options:
    _admin_route: TRUE

ai_content_strategy.delete_card:
  path: '/admin/reports/ai/content-strategy/delete-card/{section}/{title}'
  defaults:
    _controller: '\Drupal\ai_content_strategy\Controller\ContentStrategyController::deleteCard'
    _title: 'Delete Card'
  requirements:
    _permission: 'access ai content strategy'
  options:
    parameters:
      section:
        type: string
      title:
        type: string

ai_content_strategy.save_card:
  path: '/admin/reports/ai/content-strategy/save-card/{section}/{title}'
  defaults:
    _controller: '\Drupal\ai_content_strategy\Controller\ContentStrategyController::saveCard'
    _title: 'Save Card'
  requirements:
    _permission: 'access ai content strategy'
  methods: [POST]
  options:
    parameters:
      section:
        type: string
      title:
        type: string

ai_content_strategy.settings:
  path: '/admin/config/ai/content-strategy/settings'
  defaults:
    _form: '\Drupal\ai_content_strategy\Form\SettingsForm'
    _title: 'AI Content Strategy Settings'
  requirements:
    _permission: 'administer ai content strategy'

# Recommendation Category entity routes
entity.recommendation_category.collection:
  path: '/admin/config/ai/content-strategy/categories'
  defaults:
    _entity_list: 'recommendation_category'
    _title: 'Recommendation Categories'
  requirements:
    _permission: 'administer ai content strategy'

entity.recommendation_category.add_form:
  path: '/admin/config/ai/content-strategy/categories/add'
  defaults:
    _entity_form: 'recommendation_category.add'
    _title: 'Add Recommendation Category'
  requirements:
    _permission: 'administer ai content strategy'

entity.recommendation_category.edit_form:
  path: '/admin/config/ai/content-strategy/categories/{recommendation_category}/edit'
  defaults:
    _entity_form: 'recommendation_category.edit'
    _title: 'Edit Recommendation Category'
  requirements:
    _permission: 'administer ai content strategy'

entity.recommendation_category.delete_form:
  path: '/admin/config/ai/content-strategy/categories/{recommendation_category}/delete'
  defaults:
    _entity_form: 'recommendation_category.delete'
    _title: 'Delete Recommendation Category'
  requirements:
    _permission: 'administer ai content strategy'
