ai_content_strategy.recommendations:
  path: '/admin/reports/ai/content-strategy'
  defaults:
    _controller: '\Drupal\ai_content_strategy\Controller\ContentStrategyController::recommendations'
    _title: 'Content Strategy Recommendations'
  requirements:
    _permission: 'access content strategy recommendations'

ai_content_strategy.generate:
  path: '/admin/reports/ai/content-strategy/generate'
  defaults:
    _controller: '\Drupal\ai_content_strategy\Controller\ContentStrategyController::generateRecommendationsAjax'
    _title: 'Generate Recommendations'
  requirements:
    _permission: 'access content strategy recommendations'

ai_content_strategy.generate_more:
  path: '/admin/reports/ai/content-strategy/generate-more/{section}/{title}'
  defaults:
    _controller: '\Drupal\ai_content_strategy\Controller\ContentStrategyController::generateMore'
    _title: 'Generate More Ideas'
  requirements:
    _permission: 'access ai content strategy'
  options:
    parameters:
      section:
        type: string
      title:
        type: string

ai_content_strategy.gap_analysis:
  path: '/admin/reports/ai/content-strategy/gap-analysis'
  defaults:
    _controller: '\Drupal\ai_content_strategy\Controller\ContentStrategyController::gapAnalysis'
    _title: 'Content Gap Analysis'
  requirements:
    _permission: 'access ai content strategy'

ai_content_strategy.gap_analysis.analyze:
  path: '/admin/reports/ai/content-strategy/gap-analysis/analyze'
  defaults:
    _controller: '\Drupal\ai_content_strategy\Controller\ContentStrategyController::analyzeGapAjax'
    _title: 'Analyze Content Gap'
  requirements:
    _permission: 'access ai content strategy'

ai_content_strategy.competitor_analysis:
  path: '/admin/reports/ai/content-strategy/competitor'
  defaults:
    _controller: '\Drupal\ai_content_strategy\Controller\CompetitorAnalysisController::analyze'
    _title: 'Competitor Analysis'
  requirements:
    _permission: 'access content strategy recommendations'

ai_content_strategy.competitor_analysis.generate:
  path: '/admin/reports/ai/content-strategy/competitor-analysis/generate'
  defaults:
    _controller: '\Drupal\ai_content_strategy\Controller\CompetitorAnalysisController::generateAnalysisAjax'
    _title: 'Generate Competitor Analysis'
  requirements:
    _permission: 'access content strategy recommendations' 