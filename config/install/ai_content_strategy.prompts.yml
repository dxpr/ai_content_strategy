          {{ content_urls }}
        </content_urls>
      </site_info>
      <existing_recommendations>
        {{ existing_recommendations }}
      </existing_recommendations>
      </context>

      Generate 2 new trust signal recommendations that are distinctly different from the existing ones shown above.
      Each recommendation should include:
      - A specific trust signal element (must be unique from existing ones)
      - Implementation guidance
      - A priority level (high/medium/low) based on potential impact
