id: content_gap_analysis
label: 'Content Gap Analysis'
description: 'Analyzes content gaps between current site and competitor'
prompt_template: |
  Compare these two website structures and identify content gaps that should be addressed:

  Our Website Structure:
  Homepage: {{ our_structure.homepage.title }}
  
  Our Content URLs:
  {{ our_urls }}

  Competitor Content URLs:
  {{ competitor_urls }}

  Analyze the content structures and identify gaps where the competitor has valuable content types or topics that our site is missing.
  Prioritize the gaps based on:
  - Strategic importance
  - Search potential
  - User value
  - Implementation effort

  Format your response as follows:

  High Priority:
  - [Critical content gap with high impact]
  - [Another high-priority gap]

  Medium Priority:
  - [Important but less urgent gap]
  - [Another medium-priority gap]

  Low Priority:
  - [Nice-to-have content suggestion]
  - [Another low-priority gap]

  For each suggestion, focus on content types and topics rather than specific URLs. 