id: content_strategy
label: 'Content Strategy Analysis'
description: 'Analyzes website content and structure to provide EEAT-based recommendations'
prompt_template: |
  Analyze this website's content structure and provide content recommendations based on Google's EEAT framework:

  Website Homepage: {{ site_structure.homepage.title }}

  Primary Navigation:
  {{ menu_items }}

  Existing Content URLs:
  {{ urls }}

  Based on the above structure and Google's EEAT (Expertise, Experience, Authoritativeness, Trustworthiness) framework:
  1. What content gaps exist?
  2. What topics would strengthen the site's authority?
  3. What content types would best demonstrate expertise?
  4. How can we improve trust signals through content?

  Provide specific content recommendations that would enhance the site's EEAT signals.

  Format your response as follows:
  Content Gaps:
  - [gap 1]
  - [gap 2]

  Authority Topics:
  - [topic 1]
  - [topic 2]

  Expertise Demonstrations:
  - [suggestion 1]
  - [suggestion 2]

  Trust Signals:
  - [signal 1]
  - [signal 2] 