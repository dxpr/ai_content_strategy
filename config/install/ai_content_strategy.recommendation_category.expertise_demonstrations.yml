langcode: en
status: true
dependencies: {  }
id: expertise_demonstrations
label: 'Expertise Demonstrations'
description: 'Recommends ways to showcase expertise and knowledge'
weight: 2
field_mapping:
  primary_field: content_type
  secondary_field: description
  priority_field: priority
  ideas_field: content_ideas
prompt_template: 'For Expertise Demonstrations: Suggest content types and formats that showcase the site''s expertise and knowledge.'
system_prompt: |
  You are an AI content strategist analyzing a website's content structure.
  Based on the provided site information, generate 2 new expertise demonstration recommendations.
  Each recommendation should suggest ways to showcase the site's expertise and knowledge.
  Focus on content types that build credibility and trust.
  Ensure recommendations are unique and complementary to existing ones.
add_more_prompt: |
  <context>
  <site_info>
    <homepage>
      <title>{{ homepage.title }}</title>
      <content>{{ homepage.content }}</content>
    </homepage>
    <navigation>
      {{ navigation }}
    </navigation>
    <content_urls>
      {{ content_urls }}
    </content_urls>
  </site_info>
  <existing_recommendations>
    {{ existing_recommendations }}
  </existing_recommendations>
  </context>

  Generate 2 new expertise demonstration recommendations that are distinctly different from the existing ones shown above.
  Each recommendation should include:
  - A content type for demonstrating expertise (must be unique from existing ones)
  - A description of how it builds credibility
  - A priority level (high/medium/low) based on potential impact
  - 3-5 specific content ideas using this format

  Return the response in this exact JSON format:
  {
    "expertise_demonstrations": [
      {
        "content_type": "First New Expertise Format",
        "description": "Description of first format",
        "priority": "high",
        "content_ideas": ["string"]
      },
      {
        "content_type": "Second New Expertise Format",
        "description": "Description of second format",
        "priority": "medium",
        "content_ideas": ["string"]
      }
    ]
  }
schema_definition:
  type: array
  items:
    type: object
    required:
      - content_type
      - description
      - priority
    properties:
      content_type:
        type: string
      description:
        type: string
      priority:
        type: string
        enum:
          - high
          - medium
          - low
      content_ideas:
        type: array
        items:
          type: string
